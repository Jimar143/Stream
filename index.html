<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JimarStream | For Pra Pra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root { --brand: #3b82f6; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #09090b;
            color: #fafafa;
            overflow-x: hidden;
        }

        .ambient-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            background: var(--brand);
            filter: blur(120px);
            opacity: 0.12;
            z-index: -1;
            pointer-events: none;
        }

        .video-stage {
            background: #000;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            max-height: 80vh;
            width: 100%;
        }

        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            background: var(--brand);
            border-radius: 50%;
            margin-top: -4px;
        }

        .active-item {
            background: rgba(59, 130, 246, 0.08) !important;
            border-left: 3px solid var(--brand);
        }

        .like-btn-active {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.3) !important;
            color: #ef4444 !important;
        }
        .like-btn-active i {
            fill: #ef4444;
            filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.5));
        }

        #shareModal.hidden {
            display: none;
        }
    </style>
</head>
<body class="antialiased">

    <nav class="sticky top-0 z-50 border-b border-white/5 bg-black/60 backdrop-blur-xl">
        <div class="max-w-[1400px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 group cursor-pointer">
                <div class="bg-blue-600 p-1.5 rounded-lg shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform">
                    <i data-lucide="play" class="w-5 h-5 fill-white text-white"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter uppercase">JIMAR<span class="text-blue-500 font-black">STREAM</span></span>
            </div>
            <!-- RESTORED: Ang iyong original profile picture -->
            <div class="w-10 h-10 rounded-full border border-white/10 overflow-hidden bg-zinc-800">
                <img src="IMG_20260502_153801_702.jpg" alt="Profile" class="w-full h-full object-cover" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=Jimar'">
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto px-4 lg:px-8 py-8 relative">
        <div class="ambient-glow"></div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-8 space-y-6">
                <!-- Video Player -->
                <div class="video-stage group relative rounded-[2rem] overflow-hidden">
                    <video id="mainVideo" class="w-full h-auto max-h-[80vh] block object-contain" preload="auto">
                        <source id="videoSource" src="vid1.mp4" type="video/mp4">
                    </video>

                    <div id="playOverlay" class="absolute inset-0 flex items-center justify-center cursor-pointer z-10">
                        <div id="centerBtn" class="bg-blue-600/10 backdrop-blur-2xl p-8 rounded-full border border-blue-500/20 transition-all transform hover:scale-110">
                            <i data-lucide="play" id="centerIcon" class="w-12 h-12 fill-blue-500 text-blue-500"></i>
                        </div>
                    </div>

                    <!-- Player Controls -->
                    <div class="absolute inset-x-0 bottom-0 opacity-0 group-hover:opacity-100 p-8 flex flex-col gap-5 bg-gradient-to-t from-black/95 via-black/40 to-transparent z-20 pointer-events-none group-hover:pointer-events-auto transition-all">
                        <div class="relative w-full h-1.5 flex items-center cursor-pointer pointer-events-auto">
                            <div class="absolute inset-0 bg-white/10 rounded-full"></div>
                            <div id="progressFill" class="absolute inset-y-0 left-0 bg-blue-500 rounded-full z-10"></div>
                            <input type="range" id="seekSlider" class="absolute inset-0 w-full opacity-0 z-20 cursor-pointer" min="0" value="0" step="0.1">
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-6">
                                <button id="playPauseBtn" class="text-white/80 hover:text-white pointer-events-auto active:scale-90"><i data-lucide="play" id="bottomIcon" class="w-7 h-7 fill-current"></i></button>
                                <div class="flex items-center gap-3 pointer-events-auto">
                                    <i data-lucide="volume-2" class="w-5 h-5 text-zinc-500"></i>
                                    <input type="range" id="volSlider" min="0" max="1" step="0.1" value="1" class="w-20 accent-blue-500">
                                </div>
                                <span class="text-xs font-bold text-zinc-400 bg-white/5 px-2 py-1 rounded-md">
                                    <span id="curTime" class="text-white">0:00</span> / <span id="durTime">0:00</span>
                                </span>
                            </div>
                            <button id="fsBtn" class="text-zinc-500 hover:text-white pointer-events-auto"><i data-lucide="maximize" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Info and Buttons -->
                <div class="flex flex-col md:flex-row md:items-start justify-between gap-6 px-2">
                    <div class="space-y-2">
                        <h1 id="mainTitle" class="text-3xl font-extrabold tracking-tight text-white lg:text-4xl">Enchanted to meet you</h1>
                        <p class="text-sm text-zinc-500">JimarStream Studio • Official Creator</p>
                    </div>
                    
                    <div class="flex items-center gap-3">
                        <!-- REDIRECT: Like Button to TikTok -->
                        <button id="likeBtn" class="bg-white/5 hover:bg-white/10 px-6 py-3 rounded-2xl border border-white/5 transition-all text-xs font-black flex items-center gap-2 group shadow-xl">
                            <i data-lucide="heart" id="heartIcon" class="w-4 h-4 transition-all"></i>
                            <span id="likeText">LIKE</span>
                        </button>
                        <!-- SHARE: Share Button Modal -->
                        <button id="openShareBtn" class="bg-blue-600 hover:bg-blue-500 px-7 py-3 rounded-2xl transition-all text-xs font-black text-white shadow-xl shadow-blue-600/20 flex items-center gap-2 active:scale-95">
                            <i data-lucide="share-2" class="w-4 h-4"></i> SHARE
                        </button>
                    </div>
                </div>
            </div>

            <!-- Playlist Section -->
            <div class="lg:col-span-4 space-y-6">
                <h2 class="font-black text-lg tracking-tight px-2">UP NEXT</h2>
                <div id="playlist" class="space-y-3">
                    <div class="playlist-item active-item flex gap-4 p-3 rounded-3xl cursor-pointer hover:bg-white/5 transition-all" data-url="vid1.mp4" data-title="Enchanted to meet you">
                        <div class="w-32 aspect-video rounded-2xl overflow-hidden bg-zinc-900"><img src="pic1.jpeg" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=400'"></div>
                        <div class="min-w-0 flex flex-col justify-center">
                            <h4 class="text-sm font-extrabold text-zinc-100 truncate">Enchanted to meet you</h4>
                            <span class="playing-tag text-[10px] text-blue-500 font-black uppercase mt-1 italic">Playing</span>
                        </div>
                    </div>
                    <div class="playlist-item flex gap-4 p-3 rounded-3xl cursor-pointer hover:bg-white/5 transition-all" data-url="vid2.mp4" data-title="Lifetime reimagine - Cinematic">
                        <div class="w-32 aspect-video rounded-2xl overflow-hidden bg-zinc-900"><img src="pic2.jpg" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=400'"></div>
                        <div class="min-w-0 flex flex-col justify-center">
                            <h4 class="text-sm font-extrabold text-zinc-100 truncate">Lifetime reimagine</h4>
                            <span class="playing-tag hidden text-[10px] text-blue-500 font-black uppercase mt-1 italic">Playing</span>
                        </div>
                    </div>
                    <div class="playlist-item flex gap-4 p-3 rounded-3xl cursor-pointer hover:bg-white/5 transition-all" data-url="vid3.mp4" data-title="No body said it was easy">
                        <div class="w-32 aspect-video rounded-2xl overflow-hidden bg-zinc-900"><img src="pic3.jpeg" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400'"></div>
                        <div class="min-w-0 flex flex-col justify-center">
                            <h4 class="text-sm font-extrabold text-zinc-100 truncate">No body said it was easy</h4>
                            <span class="playing-tag hidden text-[10px] text-blue-500 font-black uppercase mt-1 italic">Playing</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Share Modal -->
    <div id="shareModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md hidden">
        <div class="bg-zinc-900 border border-white/10 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black">Share Experience</h3>
                <button id="closeShareBtn" class="p-2 hover:bg-white/5 rounded-full"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="grid grid-cols-4 gap-4 mb-10 text-center">
                <button onclick="shareTo('facebook')" class="flex flex-col items-center gap-3"><div class="w-14 h-14 bg-[#1877F2]/10 rounded-2xl flex items-center justify-center text-[#1877F2]"><i data-lucide="facebook"></i></div><span class="text-[10px] font-black">FB</span></button>
                <button onclick="shareTo('twitter')" class="flex flex-col items-center gap-3"><div class="w-14 h-14 bg-white/5 rounded-2xl flex items-center justify-center text-white"><i data-lucide="twitter"></i></div><span class="text-[10px] font-black">X</span></button>
                <button onclick="shareTo('whatsapp')" class="flex flex-col items-center gap-3"><div class="w-14 h-14 bg-[#25D366]/10 rounded-2xl flex items-center justify-center text-[#25D366]"><i data-lucide="message-circle"></i></div><span class="text-[10px] font-black">WA</span></button>
                <button onclick="copyLink()" class="flex flex-col items-center gap-3"><div class="w-14 h-14 bg-blue-600/10 rounded-2xl flex items-center justify-center text-blue-500"><i data-lucide="link"></i></div><span class="text-[10px] font-black">LINK</span></button>
            </div>
            <div class="bg-black/50 p-4 rounded-2xl flex items-center justify-between gap-4">
                <p id="shareUrlDisplay" class="text-[10px] text-zinc-500 truncate font-mono">Loading...</p>
                <button onclick="copyLink()" class="text-[10px] font-black text-blue-500 uppercase">Copy</button>
            </div>
            <p id="copyFeedback" class="text-center text-[10px] text-blue-500 mt-4 font-black opacity-0">Link Copied!</p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const video = document.getElementById('mainVideo');
        const progressFill = document.getElementById('progressFill');
        const seekSlider = document.getElementById('seekSlider');
        const curTimeText = document.getElementById('curTime');
        const durTimeText = document.getElementById('durTime');
        const likeBtn = document.getElementById('likeBtn');
        const mainTitle = document.getElementById('mainTitle');
        const shareModal = document.getElementById('shareModal');
        const playlistItems = document.querySelectorAll('.playlist-item');

        // SHARE MODAL FUNCTIONS
        function getSmartLink() {
            const path = video.src;
            const filename = path.substring(path.lastIndexOf('/') + 1);
            return `https://jimar143.github.io/Stream/?v=${filename}`;
        }

        document.getElementById('openShareBtn').addEventListener('click', () => {
            document.getElementById('shareUrlDisplay').innerText = getSmartLink();
            shareModal.classList.remove('hidden');
        });

        document.getElementById('closeShareBtn').addEventListener('click', () => {
            shareModal.classList.add('hidden');
        });

        function shareTo(platform) {
            const url = encodeURIComponent(getSmartLink());
            let shareUrl = "";
            if(platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            else if(platform === 'twitter') shareUrl = `https://twitter.com/intent/tweet?url=${url}`;
            else if(platform === 'whatsapp') shareUrl = `https://api.whatsapp.com/send?text=${url}`;
            window.open(shareUrl, '_blank');
        }

        function copyLink() {
            const el = document.createElement('textarea');
            el.value = getSmartLink();
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const feedback = document.getElementById('copyFeedback');
            feedback.style.opacity = '1';
            setTimeout(() => feedback.style.opacity = '0', 2000);
        }

        // LIKE REDIRECT
        let isLiked = false;
        likeBtn.addEventListener('click', () => {
            isLiked = !isLiked;
            if (isLiked) {
                likeBtn.classList.add('like-btn-active');
                document.getElementById('likeText').innerText = "LIKED";
                likeBtn.animate([{transform:'scale(1)'},{transform:'scale(1.2)'},{transform:'scale(1)'}],{duration:300});
                
                // FIXED TIKTOK WEB LINK
                const tiktokLink = "https://www.tiktok.com/@jm.bdx06/video/7630822643914083605";
                setTimeout(() => { window.open(tiktokLink, '_blank'); }, 400);
            } else {
                likeBtn.classList.remove('like-btn-active');
                document.getElementById('likeText').innerText = "LIKE";
            }
            lucide.createIcons();
        });

        // AUTOPLAY & PLAYLIST SWITCHING
        function switchVideo(item) {
            playlistItems.forEach(i => {
                i.classList.remove('active-item');
                i.querySelector('.playing-tag').classList.add('hidden');
            });
            item.classList.add('active-item');
            item.querySelector('.playing-tag').classList.remove('hidden');
            
            video.src = item.dataset.url;
            mainTitle.innerText = item.dataset.title;
            video.load();
            video.play().then(() => updateIcons(true)).catch(() => updateIcons(false));
        }

        video.addEventListener('ended', () => {
            const currentItem = document.querySelector('.active-item');
            let nextItem = currentItem.nextElementSibling;
            if (!nextItem) nextItem = playlistItems[0];
            switchVideo(nextItem);
        });

        playlistItems.forEach(item => {
            item.addEventListener('click', () => switchVideo(item));
        });

        // PLAYER CONTROLS
        function togglePlay() {
            if (video.paused) { video.play(); updateIcons(true); }
            else { video.pause(); updateIcons(false); }
        }

        function updateIcons(isPlaying) {
            const centerIcon = document.getElementById('centerIcon');
            const bottomIcon = document.getElementById('bottomIcon');
            const centerBtn = document.getElementById('centerBtn');
            if (isPlaying && centerIcon) {
                centerIcon.setAttribute('data-lucide', 'pause');
                bottomIcon.setAttribute('data-lucide', 'pause');
                centerBtn.style.opacity = '0';
            } else if (centerIcon) {
                centerIcon.setAttribute('data-lucide', 'play');
                bottomIcon.setAttribute('data-lucide', 'play');
                centerBtn.style.opacity = '1';
            }
            lucide.createIcons();
        }

        document.getElementById('playOverlay').addEventListener('click', togglePlay);
        document.getElementById('playPauseBtn').addEventListener('click', togglePlay);
        video.addEventListener('timeupdate', () => {
            if (!isNaN(video.duration)) {
                const p = (video.currentTime / video.duration) * 100;
                progressFill.style.width = `${p}%`;
                seekSlider.value = video.currentTime;
                curTimeText.innerText = formatTime(video.currentTime);
            }
        });
        video.addEventListener('loadedmetadata', () => {
            durTimeText.innerText = formatTime(video.duration);
            seekSlider.max = video.duration;
        });
        seekSlider.addEventListener('input', () => video.currentTime = seekSlider.value);
        document.getElementById('volSlider').addEventListener('input', (e) => video.volume = e.target.value);
        document.getElementById('fsBtn').addEventListener('click', () => {
            if (!document.fullscreenElement) video.parentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        function formatTime(s) {
            const min = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }
    </script>
</body>
</html>
